{% load static %}
{% load quizzes_tags %}

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{{title}}</title>
    <link rel="stylesheet" type="text/css" href="{% static 'quizzes/css/styles.css' %}">
</head>
<body>

    <ul class="menu">
        {% for m in menu %}
            <li><a href="{% url m.url_name %}">{{m.title}}</a></li>
        {% endfor %}
    </ul>

    <div class="category-nav">
        {% show_categories cat_selected=cat_selected %}
    </div>
    {% show_all_tags %}

    {% block content %}
    {% endblock %}
    <footer>
        {% show_popular 3 %}
    </footer>

</body>
</html>
